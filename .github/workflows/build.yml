name: Build Flutter APK
permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write Firebase config files from secrets
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "ERROR: GOOGLE_SERVICES_JSON secret is not set or empty."
            exit 1
          fi
          if [ -z "$FIREBASE_OPTIONS_DART" ]; then
            echo "ERROR: FIREBASE_OPTIONS_DART secret is not set or empty."
            exit 1
          fi
          # Ensure directories exist before writing
          mkdir -p expense_tracker/android/app
          mkdir -p expense_tracker/lib
          echo "$GOOGLE_SERVICES_JSON" > expense_tracker/android/app/google-services.json
          echo "$FIREBASE_OPTIONS_DART" > expense_tracker/lib/firebase_options.dart

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle' # <--- Caches Gradle dependencies and wrappers

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true # <--- Caches the Flutter SDK itself
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:" # Optional: more specific caching
          cache-path: "${{ runner.tool_cache }}/flutter"

      - name: Verify Flutter Installation
        run: |
          flutter --version
          flutter doctor -v

      - name: Install Dependencies
        run: |
          cd expense_tracker
          flutter pub get

      - name: Analyze Code
        run: |
          cd expense_tracker
          flutter analyze

      - name: Build APK
        run: |
          cd expense_tracker
          # Building with --debug as requested, but caching still helps Gradle
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: expense_tracker/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error