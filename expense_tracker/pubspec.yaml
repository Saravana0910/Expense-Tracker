name: expense_tracker
description: "Smart Expense Tracker - Track your expenses with Firebase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Charts
  fl_chart: ^0.66.1

  # Utilities
  intl: ^0.20.2
  go_router: ^17.1.0
  uuid: ^4.2.1

  # UI/UX
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
